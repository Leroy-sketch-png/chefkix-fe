<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Plate (circle) -->
  <ellipse cx="100" cy="140" rx="70" ry="14" fill="#e8ddd0" opacity="0.6"/>
  <circle cx="100" cy="120" r="55" fill="url(#plate-gradient)" stroke="#e8ddd0" stroke-width="3"/>
  <circle cx="100" cy="120" r="40" fill="none" stroke="#f0e8dc" stroke-width="1.5"/>
  
  <!-- Sad face on plate -->
  <circle cx="84" cy="112" r="4" fill="#c4a882"/>
  <circle cx="116" cy="112" r="4" fill="#c4a882"/>
  <path d="M85 130 Q100 122 115 130" stroke="#c4a882" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <!-- Chef hat floating above (the "lost" recipe) -->
  <g transform="translate(100,40)" opacity="0.5">
    <path d="M6 17a1 1 0 0 0 1-1v-5.35c0-.457.316-.844.727-1.041a4 4 0 0 0-2.134-7.589 5 5 0 0 0-9.186 0 4 4 0 0 0-2.134 7.588c.411.198.727.585.727 1.041V16a1 1 0 0 0 1 1Z" stroke="#ff5a36" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="scale(2) translate(-6,-10)"/>
    <line x1="-12" y1="11" x2="12" y2="11" stroke="#ff5a36" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Steam wisps (empty plate humor) -->
  <path d="M75 85 Q72 75 78 68" stroke="#d4c4b0" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M100 80 Q97 70 103 63" stroke="#d4c4b0" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M125 85 Q122 75 128 68" stroke="#d4c4b0" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  
  <!-- Fork and knife crossed (X = not found) -->
  <g transform="translate(100, 120)" opacity="0.15">
    <line x1="-30" y1="-30" x2="30" y2="30" stroke="#2c2420" stroke-width="4" stroke-linecap="round"/>
    <line x1="30" y1="-30" x2="-30" y2="30" stroke="#2c2420" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <defs>
    <linearGradient id="plate-gradient" x1="45" y1="65" x2="155" y2="175" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fdfbf8"/>
      <stop offset="1" stop-color="#f5ede3"/>
    </linearGradient>
  </defs>
</svg>
